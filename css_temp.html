<style>
        /* Immediate critical style for preloader */
        body.loading {
            overflow: hidden !important;
        }
        body.loading .wpo-site-header {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
        }
        #preloader.fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        .preloader-logo img {
            width: 140px;
            height: auto;
            animation: preloader-pulse 1.8s ease-in-out infinite;
            display: block;
        }
        @keyframes preloader-pulse {
            0% {
                transform: scale(0.96);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.04);
                opacity: 1;
            }
            100% {
                transform: scale(0.96);
                opacity: 0.85;
            }
        }

        /* CSS to hide cloned sticky header completely */
        .sticky-header {
            display: none !important;
        }

        /* Force couples title on a single line for desktop and tablet, wrapping on mobile */
        .couples-title {
            font-size: clamp(24px, 3.2vw, 40px) !important;
            white-space: nowrap !important;
        }
        @media (max-width: 767px) {
            .couples-title {
                white-space: normal !important;
                font-size: 24px !important;
            }
        }

        /* Add gap between sections */
        section, .wpo-testimonial-area {
            margin-bottom: 80px;
        }
        @media (max-width: 991px) {
            section, .wpo-testimonial-area {
                margin-bottom: 50px;
            }
        }

        /* Instagram Feed Section Styling */
        .instagram-feed-section {
            background-color: #ffffff;
            padding-top: 80px;
            padding-bottom: 90px;
            position: relative;
            z-index: 1;
            border-top: 1px solid #eaeaea;
            border-bottom: 1px solid #eaeaea;
        }
        .instagram-feed-section .couples-title {
            font-size: clamp(36px, 5vw, 64px) !important;
            margin-bottom: 20px;
            color: #555555;
        }
        .insta-badge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        .insta-badge {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff !important;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(225, 48, 108, 0.35);
            transition: transform 0.3s ease;
        }
        .insta-badge:hover {
            transform: scale(1.05);
        }
        .insta-badge i {
            font-size: 18px;
        }
        .insta-subtitle {
            font-size: 18px;
            color: #666666;
            max-width: 650px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
            font-family: "Cormorant Garamond", serif;
        }
        .insta-filter-toggle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .insta-filter-toggle {
            background: #f3f3f3;
            border-radius: 50px;
            padding: 6px;
            display: flex;
            gap: 5px;
            border: 1px solid #e0e0e0;
        }
        .insta-filter-btn {
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555555;
        }
        .insta-filter-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        .insta-filter-btn i {
            font-size: 15px;
        }
        .instagram-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }
        .instagram-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .instagram-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .instagram-card:hover img {
            transform: scale(1.05);
        }
        .insta-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .instagram-card:hover .insta-overlay {
            opacity: 1;
        }
        .insta-overlay i {
            color: #ffffff;
            font-size: 55px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }
        .instagram-card:hover .insta-overlay i {
            transform: scale(1.1);
        }

        /* Instagram Modal Styles */
        .insta-modal {
            display: none;
            position: fixed;
            z-index: 99999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }
        .insta-modal-content {
            position: relative;
            background-color: transparent;
            margin: auto;
            padding: 0;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .instagram-embed-wrapper {
            background: transparent;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 1px 0 rgba(0,0,0,0.5), 0 1px 10px 0 rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        .instagram-embed-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .instagram-embed-wrapper iframe,
        .instagram-embed-wrapper blockquote {
            margin: 0 !important;
            width: 100% !important;
        }
        .close-insta-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: 300;
            transition: 0.3s;
            cursor: pointer;
            z-index: 100000;
        }
        .close-insta-modal:hover {
            color: #e1306c;
        }

        #instagram-grid {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 15px;
        }
        #instagram-grid::-webkit-scrollbar {
            display: none;
        }
        #instagram-grid .col-lg-4 {
            scroll-snap-align: center;
        }

        @media (max-width: 991px) {
            #instagram-grid .col-lg-4 {
                flex: 0 0 100%;
                max-width: 100%;
                margin-right: 0;
            }
            .instagram-feed-section .couples-title {
                font-size: 40px !important;
            }
        }

        /* Toggleable Dropdown Header Styles */
        .wpo-site-header .navigation {
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        
        .wpo-site-header.header-hidden .navigation {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* Header Dropdown Arrow Indicator */
        .header-dropdown-trigger {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-radius: 0 0 10px 10px;
            color: #ffffff;
            width: 50px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            transition: background 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .header-dropdown-trigger:hover {
            background: rgba(0, 0, 0, 0.9);
        }
        .header-dropdown-trigger i {
            transition: transform 0.4s ease;
            font-size: 12px;
        }
        .wpo-site-header.header-hidden + .header-dropdown-trigger i {
            transform: rotate(180deg);
        }

        /* Continuous marquee effect for gallery slider */
        #fav-moments-slider .owl-stage {
            transition-timing-function: linear !important;
        }
    </style>
