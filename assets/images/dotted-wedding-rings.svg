<svg xmlns="http://www.w3.org/2000/svg" width="764" height="382" viewBox="0 0 764 382">
  <!-- Interlocking dotted rings representing wedding bands -->
  <g opacity="0.15" fill="none" stroke="#000000" stroke-width="2">
    <!-- Ring 1 -->
    <circle cx="320" cy="191" r="100" stroke-dasharray="6,6" />
    <!-- Ring 2 -->
    <circle cx="440" cy="191" r="100" stroke-dasharray="6,6" />
    
    <!-- Accent Dots -->
    <circle cx="150" cy="100" r="2.5" fill="#000000" stroke="none" />
    <circle cx="614" cy="100" r="2.5" fill="#000000" stroke="none" />
    <circle cx="200" cy="280" r="2.5" fill="#000000" stroke="none" />
    <circle cx="564" cy="280" r="2.5" fill="#000000" stroke="none" />
    <circle cx="380" cy="60" r="3" fill="#000000" stroke="none" />
    <circle cx="380" cy="320" r="3" fill="#000000" stroke="none" />
  </g>
</svg>
